      '\u5c55\u793a\u6807\u8bb0\u4e86\u300c\u6709\u98ce\u9669\u300d\u4e14\u672a\u5b8c\u6210\u7684\u4efb\u52a1\u6570\u91cf\u3002\u70b9\u51fb\u53ef\u8df3\u8f6c\u5230\u4efb\u52a1\u7ba1\u7406\u9875\u9762\u67e5\u770b\u8be6\u60c5\u3002',
      '#\u9010\u671f\u95ee\u9898\u5355\uff08\u9ec4\u8272\u5361\u7247\uff09',
      '\u5c55\u793a\u72b6\u6001\u4e3a\u8fdb\u884c\u4e2d\u4e14\u8ba1\u5212\u7ed3\u675f\u65e5\u671f\u5df2\u8fc7\u7684\u95ee\u9898\u5355\u3002\u5e94\u7acb\u5373\u8ddf\u8fdb\u5904\u7406\u3002',
      '#\u4eca\u65e5\u5f85\u529e',
      '\u5c55\u793a\u4eca\u5929\u5230\u671f\u6216\u8ba1\u5212\u5f00\u59cb\u7684\u4efb\u52a1\u5217\u8868\u3002\u5e2e\u52a9\u7ba1\u7406\u5458\u5feb\u901f\u638c\u63e1\u4eca\u65e5\u56e2\u961f\u5de5\u4f5c\u91cd\u70b9\u3002',
    ]);

    // ── 签到管理 ────────────────────────────────────────────────────────────
    out+=sec('\uD83D\uDCC5','\u7b7e\u5230\u7ba1\u7406\uff08\u7ba1\u7406\u5458\uff09',[
      '\u5c55\u793a\u5f53\u6708\u5404\u6210\u5458\u7684\u7b7e\u5230\u6c47\u603b\u8868\uff0c\u5305\u62ec\u5de5\u4f5c\u65e5\u6570\u3001\u51fa\u52e4\u3001\u7f3a\u52e4\u3001\u8fdf\u5230\u3001\u8bf7\u5047\u3001\u8fdc\u7a0b\u3001\u51fa\u52e4\u7387\u3002',
      '#\u4eca\u65e5\u7b7e\u5230\u5217',
      '\u663e\u793a\u5f53\u65e5\u7b7e\u5230\u72b6\u6001\u5f7d\u7ae0\u548c\u6253\u5361\u65f6\u95f4\uff08\u5982\u300008:52\u300d\uff09\uff0c\u65b9\u4fbf\u67e5\u770b\u662f\u5426\u6309\u65f6\u51fa\u52e4\u3002',
      '#\u8fdf\u5230\u5929\u6570',
      '\u663e\u793a\u4e3a\u53ef\u70b9\u51fb\u7684\u6a59\u8272\u4e0b\u5212\u7ebf\u6570\u5b57\uff0c\u70b9\u51fb\u540e\u5f39\u51fa\u8be6\u7ec6\u8fdf\u5230\u8bb0\u5f55\uff0c\u5305\u62ec\u65e5\u671f\u548c\u5177\u4f53\u6253\u5361\u65f6\u95f4\u3002',
      '#\u64cd\u4f5c\u6309\u949e',
      '\u300c\u4fee\u6539\u4eca\u65e5\u300d\uff1a\u8c03\u6574\u6307\u5b9a\u6210\u5458\u5f53\u65e5\u7684\u7b7e\u5230\u72b6\u6001\u548c\u5907\u6ce8\u3002',
      '\u300c\u5168\u90e8\u8bb0\u5f55\u300d\uff1a\u5f39\u51fa\u8be5\u6210\u5458\u672c\u6708\u6240\u6709\u7b7e\u5230\u8bb0\u5f55\u660e\u7ec6\u8868\u3002',
      '\u300c\u4eca\u65e5\u5168\u5458\u8003\u52e4\u300d\uff1a\u6279\u91cf\u5f55\u5165\u5f53\u65e5\u5168\u5458\u8003\u52e4\u72b6\u6001\uff0c\u9002\u5408\u6bcf\u65e5\u8fdb\u884c\u65e5\u5e38\u6253\u5361\u7ba1\u7406\u3002',
      '\u300c\u2699\ufe0f \u8fdf\u5230\u8bbe\u7f6e\u300d\uff1a\u914d\u7f6e\u8fdf\u5230\u5224\u5b9a\u65f6\u95f4\u9608\u503c\uff0c\u9ed8\u8ba4 09:00\uff0c\u665a\u4e8e\u8be5\u65f6\u95f4\u7b7e\u5230\u5219\u81ea\u52a8\u8bb0\u5f55\u300c\u8fdf\u5230\u300d\u3002',
      '!\u5386\u53f2\u6570\u636e\u5bfc\u5165\u524d\u5efa\u8bae\u5148\u786e\u8ba4\u6210\u5458 ID \u4e0e\u6570\u636e\u5e93\u4e00\u81f4\uff0c\u907f\u514d\u5f20\u51a0\u8bb0\u5f55\u9519\u4f4d\u3002',
    ]);

    // ── 任务管理 ─────────────────────────────────────────────────────────────
    out+=sec('\uD83D\uDCCB','\u4efb\u52a1\u7ba1\u7406\uff08\u7ba1\u7406\u5458\uff09',[
      '\u652f\u6301\u56db\u79cd\u4efb\u52a1\u7c7b\u578b\uff1a\u300c\u9700\u6c42\u300d\u300c\u95ee\u9898\u5355\u300d\u300c\u73b0\u573a\u652f\u6491\u300d\u300c\u5176\u4ed6\u4e8b\u52a1\u300d\uff0c\u53ef\u901a\u8fc7\u9875\u7b7e\u5207\u6362\u3002',
      '#\u521b\u5efa/\u7f16\u8f91\u4efb\u52a1',
      '\u6807\u9898\uff08\u5fc5\u586b *\uff09\u3001\u8d1f\u8d23\u4eba\u3001\u8ba1\u5212\u5f00\u59cb\u65e5\u671f\uff08\u5fc5\u586b *\uff09\u3001\u8ba1\u5212\u7ed3\u675f\u65e5\u671f\uff08\u5fc5\u586b *\uff09\u3001\u9884\u4f30\u5929\u6570\u3001\u529f\u80fd\u6a21\u5757\u3001\u4ea4\u4ed8\u6708\u3002',
      '\u8d1f\u8d23\u4eba\u4e0b\u62c9\u5305\u542b\u5168\u90e8\u6d3b\u8dc3\u6210\u5458\u548c\u7ba1\u7406\u5458\uff08\u7ba1\u7406\u5458\u540d\u5b57\u540e\u6807\u6ce8\u300c(\u7ba1)\u300d\uff09\u3002',
      '\u300c\u7236\u4efb\u52a1\u300d\u5b57\u6bb5\u652f\u6301\u5c42\u7ea7\u5173\u8054\uff0c\u5b50\u4efb\u52a1\u5728\u5217\u8868\u4e2d\u7f29\u8fdb\u663e\u793a\u3002',
      '#\u72b6\u6001\u6d41\u8f6c',
      '\u9700\u6c42\uff1a\u5f85\u5904\u7406 \u2192 \u8fdb\u884c\u4e2d \u2192 \u8054\u8c03\u6d4b\u8bd5 \u2192 \u5df2\u4ea4\u4ed8 \u2192 \u5df2\u53d6\u6d88\u3002',
      '\u95ee\u9898\u5355\uff1a\u5f85\u5904\u7406 \u2192 \u8fdb\u884c\u4e2d \u2192 \u5df2\u89e3\u51b3 \u2192 \u5df2\u5173\u95ed \u2192 \u5df2\u62d2\u7edd\u3002',
      '#\u8fdb\u5ea6\u65e5\u5fd7',
      '\u5728\u4efb\u52a1\u5217\u8868\u70b9\u51fb\u4efb\u52a1\u540d\uff0c\u53ef\u627e\u5230\u300c\u6dfb\u52a0\u65e5\u5fd7\u300d\u529f\u80fd\u3002\u6bcf\u6761\u65e5\u5fd7\u5305\u62ec\u65e5\u671f\u3001\u8fdb\u5ea6\u767e\u5206\u6bd4\u3001\u5185\u5bb9\u63cf\u8ff0\u3002\u7528\u4e8e\u7518\u7279\u56fe\u7684\u300c\u65e5\u671f\u9ad8\u4eae\u300d\u529f\u80fd\u3002',
      '!\u5220\u9664\u4efb\u52a1\u524d\u8bf7\u786e\u8ba4\uff0c\u64cd\u4f5c\u4e0d\u53ef\u6062\u590d\u3002',
    ]);

    // ── 成员视图 ─────────────────────────────────────────────────────────────
    out+=sec('\uD83D\uDC65','\u6210\u5458\u89c6\u56fe\uff08\u7ba1\u7406\u5458\uff09',[
      '\u4ee5\u5361\u7247\u5f62\u5f0f\u5c55\u793a\u6bcf\u4f4d\u6210\u5458\u7684\u4efb\u52a1\u72b6\u6001\u548c\u8fdb\u5c55\u3002',
      '\u6bcf\u4e2a\u5361\u7247\u5305\u542b\uff1a\u8fdb\u884c\u4e2d\u4efb\u52a1\u6570\u3001\u6807\u8bc6\u98ce\u9669\u4efb\u52a1\u7684\u8b66\u544a\u3001\u4eca\u65e5\u65e5\u5fd7\u7b49\u4fe1\u606f\u3002',
      '\u9875\u9762\u9876\u90e8\u53ef\u8f93\u5165\u65e5\u671f\u8fdb\u884c\u7b5b\u9009\uff0c\u67e5\u770b\u67d0\u4e00\u5929\u5404\u6210\u5458\u7684\u5177\u4f53\u8fdb\u5c55\u3002',
    ]);

    // ── 甘特图（管理员）─────────────────────────────────────────────────────
    out+=sec('\uD83D\uDCCA','\u7518\u7279\u56fe\uff08\u7ba1\u7406\u5458\uff09',[
      '\u6309\u6210\u5458\u5c55\u793a\u4efb\u52a1\u65f6\u95f4\u7ebf\uff0c\u652f\u6301\u6309\u6708\u6216\u5168\u5e74\u89c6\u56fe\u3002',
      '#\u5206\u7ec4\u5feb\u901f\u9009\u4eba',
      '\u6210\u5458\u52fe\u9009\u6846\u4e0a\u65b9\u663e\u793a\u5206\u7ec4\u6309\u949e\uff0c\u70b9\u51fb\u67d0\u4e2a\u7ec4\uff0c\u81ea\u52a8\u52fe\u9009\u8be5\u7ec4\u6240\u6709\u6210\u5458\uff08\u542b\u7ba1\u7406\u5458\uff09\u3002\u518d\u6b21\u70b9\u51fb\u53ef\u53d6\u6d88\u8be5\u7ec4\u3002',
      '\u4e5f\u53ef\u5355\u72ec\u52fe\u9009/\u53d6\u6d88\u5177\u4f53\u67d0\u4e2a\u6210\u5458\uff0c\u652f\u6301\u591a\u4eba\u6df7\u9009\u3002',
      '\u300c\u5168\u9009\u300d\u9009\u4e2d\u6240\u6709\u6210\u5458\uff0c\u300c\u5168\u4e0d\u9009\u300d\u663e\u793a\u300c\u672a\u9009\u62e9\u4efb\u4f55\u6210\u5458\u300d\u7a7a\u767d\u7ee3\u53e3\u3002',
      '#\u65e5\u671f\u9ad8\u4eae\u8fdb\u5c55\u67e5\u770b',
      '\u300c\u4eca\u5929\u300d\u300c\u6628\u5929\u300d\u6309\u949e\u53ef\u5feb\u901f\u9009\u5b9a\u65e5\u671f\uff0c\u518d\u6b21\u70b9\u51fb\u53ef\u53d6\u6d88\u9ad8\u4eae\u3002\u4e5f\u53ef\u624b\u52a8\u8f93\u5165\u4efb\u610f\u65e5\u671f\uff0c\u70b9\u51fb\u300c\u6e05\u9664\u300d\u53d6\u6d88\u9009\u5b9a\u3002',
      '\u9ad8\u4eae\u65e5\u671f\u540e\uff0c\u5f53\u5929\u6709\u8fdb\u5c55\u8bb0\u5f55\u7684\u4efb\u52a1\u884c\u663e\u793a\u9ec4\u8272\u5de6\u8fb9\u6846\uff0c\u8fdb\u5c55\u6761\u4e0a\u5bf9\u5e94\u65e5\u671f\u7684\u7ad6\u7ebf\u53d8\u9ec4\u3002',
      '#\u5206\u7ec4\u5c42\u7ea7\u5c55\u793a',
      '\u7518\u7279\u56fe\u6309\u5206\u7ec4\u5c0f\u6807\u9898\u5212\u5206\u533a\u5757\uff0c\u591a\u4e2a\u7ec4\u65f6\u663e\u793a\u7ec4\u540d\u548c\u4eba\u6570\u3002',
      '#\u4efb\u52a1\u6761\u989c\u8272',
      '\u84dd\u8272\uff1d\u8fdb\u884c\u4e2d\uff0c\u7eff\u8272\uff1d\u5df2\u5b8c\u6210\uff0c\u7ea2\u8272\uff1d\u6709\u98ce\u9669\u3002\u4efb\u52a1\u540d\u524d\u9762\u5e26\u5f69\u8272\u6807\u7b7e\u8868\u793a\u7c7b\u578b\u3002',
      '#\u70b9\u51fb\u4efb\u52a1\u6761',
      '\u70b9\u51fb\u4efb\u4e00\u4efb\u52a1\u6761\u53ef\u6253\u5f00\u8be5\u4efb\u52a1\u7684\u8fdb\u5ea6\u65e5\u5fd7\u9762\u677f\uff0c\u67e5\u770b\u5386\u53f2\u65e5\u5fd7\u6216\u65b0\u589e\u5f53\u5929\u8fdb\u5c55\u3002',
    ]);

    // ── 月度日历 ─────────────────────────────────────────────────────────────
    out+=sec('\uD83D\uDCC6','\u6708\u5ea6\u65e5\u5386\uff08\u7ba1\u7406\u5458\uff09',[
      '\u4ee5\u65e5\u5386\u5f62\u5f0f\u5c55\u793a\u5f53\u6708\u6bcf\u5929\u5404\u6210\u5458\u7684\u4efb\u52a1\u5206\u5e03\u3002',
      '\u9876\u90e8\u53ef\u9009\u62e9\u5e74/\u6708\uff0c\u53f3\u4fa7\u53ef\u52fe\u9009/\u53d6\u6d88\u7279\u5b9a\u6210\u5458\u8fdb\u884c\u7b5b\u9009\u3002',
      '\u6bcf\u5929\u683c\u5185\u5c55\u793a\u5f53\u5929\u6709\u8ba1\u5212\u7684\u4efb\u52a1\u540d\u79f0\u548c\u8d1f\u8d23\u4eba\uff0c\u65b9\u4fbf\u67e5\u770b\u6bcf\u4e2a\u5de5\u4f5c\u65e5\u7684\u5de5\u4f5c\u5206\u914d\u3002',
      '!\u5982\u679c\u5386\u53f2\u6570\u636e\u4e2d\u4efb\u52a1\u7684 group_name \u5b57\u6bb5\u4e0d\u4e00\u81f4\uff0c\u6b64\u9875\u9762\u5c06\u4ee5\u6210\u5458ID\u4e3a\u51c6\u786e\u5b9a\u5f52\u5c5e\uff0c\u517c\u5bb9\u5386\u53f2\u6570\u636e\u3002',
    ]);

    // ── 成员管理 ─────────────────────────────────────────────────────────────
    out+=sec('\uD83D\uDC64','\u6210\u5458\u7ba1\u7406',[
      '\u5c55\u793a\u6240\u6709\u6d3b\u8dc3\u6210\u5458\u5217\u8868\uff0c\u5305\u542b\u8d26\u53f7\u3001\u59d3\u540d\u3001\u89d2\u8272\u3001\u6240\u5c5e\u5206\u7ec4\u3002',
      '#\u65b0\u5efa\u6210\u5458',
      '\u586b\u5199\u59d3\u540d\u3001\u767b\u5f55\u8d26\u53f7\u3001\u521d\u59cb\u5bc6\u7801\u3001\u89d2\u8272\u3001\u6240\u5c5e\u7ec4\u3002\u52fe\u9009\u300c\u7ba1\u7406\u5458\u300d\u53ef\u521b\u5efa\u666e\u901a\u7ba1\u7406\u5458\u8d26\u53f7\u3002',
      '#\u7f16\u8f91\u6210\u5458',
      '\u53ef\u4fee\u6539\u59d3\u540d\u3001\u5bc6\u7801\u3001\u89d2\u8272\u3001\u5206\u7ec4\u3001\u662f\u5426\u7ba1\u7406\u5458\u7b49\u4fe1\u606f\u3002',
      '#\u505c\u7528\u4e0e\u5220\u9664',
      '\u300c\u505c\u7528\u300d\uff1a\u8f6f\u5220\u9664\uff0c\u8be5\u6210\u5458\u65e0\u6cd5\u767b\u5f55\u4f46\u5386\u53f2\u6570\u636e\u4fdd\u7559\u3002\u53ef\u91cd\u65b0\u5f00\u542f\u3002',
      '\u300c\u6c38\u4e45\u5220\u9664\u300d\uff1a\u5f7b\u5e95\u79fb\u9664\u8be5\u6210\u5458\u6240\u6709\u6570\u636e\uff0c\u4e0d\u53ef\u6062\u590d\u3002',
      '!\u8d85\u7ea7\u7ba1\u7406\u5458 admin \u8d26\u53f7\u4e0d\u80fd\u88ab\u505c\u7528\u6216\u5220\u9664\u3002',
    ]);

    // ── 报表中心 ─────────────────────────────────────────────────────────────
    out+=sec('\uD83D\uDCC8','\u62a5\u8868\u4e2d\u5fc3',[
      '\u63d0\u4f9b\u591a\u7ef4\u5ea6\u6570\u636e\u5206\u6790\uff0c\u652f\u6301\u6309\u65f6\u95f4\u8303\u56f4\u3001\u6309\u5206\u7ec4\u3001\u6309\u6210\u5458\u7b5b\u9009\u3002',
      '#\u4ea4\u4ed8\u6392\u540d',
      '\u6309\u4ea4\u4ed8\u6570\u91cf\u5c01\u6210\u5458\u6392\u540d\uff0c\u76f4\u89c2\u5c55\u793a\u56e2\u961f\u4e2d\u8c01\u7684\u8d21\u732e\u6700\u591a\u3002',
      '#\u9700\u6c42/\u95ee\u9898\u5355/\u73b0\u573a\u652f\u6491/\u5176\u4ed6',
      '\u5206\u522b\u5c55\u793a\u5404\u7c7b\u578b\u4efb\u52a1\u7684\u5b8c\u6210\u3001\u8fdb\u884c\u4e2d\u3001\u98ce\u9669\u3001\u9010\u671f\u60c5\u51b5\uff0c\u652f\u6301\u6309\u6210\u5458\u7b5b\u9009\u5bf9\u6bd4\u3002',
      '#\u7b7e\u5230\u62a5\u8868',
      '\u5c55\u793a\u5404\u6210\u5458\u7684\u51fa\u52e4\u7387\u8d70\u52bf\uff0c\u5305\u542b\u51fa\u52e4\u3001\u8fdf\u5230\u3001\u7f3a\u52e4\u3001\u8bf7\u5047\u7b49\u6307\u6807\u3002',
      '\u9875\u9762\u9876\u90e8\u5982\u6709\u591a\u4e2a\u5206\u7ec4\uff0c\u53ef\u901a\u8fc7\u5206\u7ec4\u6309\u949e\u5207\u6362\u67e5\u770b\u4e0d\u540c\u56e2\u961f\u7684\u6570\u636e\u3002',
    ]);
  }

  // ── 成员端功能 ──────────────────────────────────────────────────────────
