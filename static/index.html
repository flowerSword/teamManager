<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>团队管理系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--s1:#1e293b;--s2:#273348;--s3:#1a2744;
  --bg-rgb:15,23,42;--s1-rgb:30,41,59;--s2-rgb:39,51,72;
  --border:#334155;--border2:#2d3f5a;
  --pri:#3b82f6;--pri2:#1d4ed8;--acc:#06b6d4;
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --r:10px;--rl:16px;
  --row-hover:rgba(30,41,59,.4);
  --login-g1:#0f3460;--login-g2:#0c2a4a
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* LOGIN */
#lp{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 20% 50%,var(--login-g1),var(--bg) 60%),
             radial-gradient(ellipse at 80% 20%,var(--login-g2),transparent 50%)}
.lbox{width:420px;background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);
  padding:40px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.llogo{text-align:center;margin-bottom:28px}
.llogo .ico{width:52px;height:52px;background:linear-gradient(135deg,var(--pri),var(--acc));border-radius:12px;
  display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:10px}
.llogo h1{font-size:20px;font-weight:700}
.llogo p{color:var(--tx2);font-size:13px;margin-top:4px}
.linput{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  color:var(--tx);font-size:14px;transition:border .2s;font-family:inherit}
.linput:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.lbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--pri),var(--pri2));border:none;
  border-radius:var(--r);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s}
.lbtn:hover{opacity:.9}
.lerr{color:var(--err);font-size:13px;margin-top:8px;text-align:center;min-height:18px}
.lhint{margin-top:16px;padding:11px 14px;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);
  border-radius:8px;font-size:12px;color:var(--tx2);line-height:1.9}
.fgroup{margin-bottom:14px}
.flabel{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px}
.flabel .req{color:var(--err)}

/* LAYOUT */
#app{display:none;min-height:100vh}
.sb{width:224px;background:var(--s1);border-right:1px solid var(--border);
  position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
.sb-top{padding:18px 14px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.sb-logo .ico{width:32px;height:32px;background:linear-gradient(135deg,var(--pri),var(--acc));border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:15px}
.sb-logo span{font-size:14px;font-weight:700}
.ucard{background:var(--s2);border-radius:8px;padding:9px 11px;display:flex;align-items:center;gap:9px}
.uav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--acc));
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.uname{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.urole{font-size:11px;color:var(--tx3)}
.sb-nav{flex:1;padding:8px 6px;overflow-y:auto}
.nav-sec{font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;color:var(--tx2);cursor:pointer;border-radius:8px;
  margin-bottom:1px;font-size:13px;transition:all .12s;background:none;border:none;width:100%;text-align:left}
.ni:hover{color:var(--tx);background:var(--s2)}
.ni.active{color:var(--pri);background:rgba(59,130,246,.1)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.sb-bot{padding:8px 6px;border-top:1px solid var(--border)}
.main{margin-left:224px;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;
  position:sticky;top:0;z-index:90}
.tb-title{font-size:14px;font-weight:700}
.content{padding:22px;flex:1}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ctitle{font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{border-radius:var(--rl);padding:16px}
.sc-blue{background:linear-gradient(135deg,#1d4ed8,#3b82f6)}
.sc-teal{background:linear-gradient(135deg,#0e7490,#06b6d4)}
.sc-amber{background:linear-gradient(135deg,#b45309,#f59e0b)}
.sc-red{background:linear-gradient(135deg,#b91c1c,#ef4444)}
.sc-purple{background:linear-gradient(135deg,#6d28d9,#8b5cf6)}
.sc-green{background:linear-gradient(135deg,#047857,#10b981)}
.sc-slate{background:linear-gradient(135deg,#334155,#475569)}
.sl{font-size:11px;opacity:.8;margin-bottom:5px}
.sv{font-size:26px;font-weight:800}
.ss{font-size:11px;opacity:.65;margin-top:1px}

/* TABLE */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--s2);padding:9px 11px;text-align:left;font-weight:600;color:var(--tx2);
   border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid rgba(51,65,85,.4);vertical-align:middle}
tr:hover td{background:var(--row-hover)}
tr.hi td{background:rgba(59,130,246,.04)}

/* BADGE */
.bd{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.bd-blue{background:rgba(59,130,246,.14);color:#60a5fa}
.bd-green{background:rgba(16,185,129,.14);color:#34d399}
.bd-amber{background:rgba(245,158,11,.14);color:#fbbf24}
.bd-red{background:rgba(239,68,68,.14);color:#f87171}
.bd-gray{background:rgba(100,116,139,.14);color:#94a3b8}
.bd-purple{background:rgba(139,92,246,.14);color:#a78bfa}
.bd-teal{background:rgba(6,182,212,.14);color:#22d3ee}
.bd-orange{background:rgba(234,88,12,.14);color:#fb923c}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:8px;
  border:1px solid var(--border);background:var(--s2);color:var(--tx);
  cursor:pointer;font-size:13px;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--pri);color:var(--pri)}
.btn-pri{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn-pri:hover{background:var(--pri2);border-color:var(--pri2);color:#fff}
.btn-err{background:transparent;color:var(--err);border-color:var(--err)}
.btn-err:hover{background:rgba(239,68,68,.08)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--tx2)}
.btn-ghost:hover{background:var(--s2);border-color:var(--border);color:var(--tx)}
.btn-sm{padding:4px 9px;font-size:12px}

/* PROGRESS */
.prog{background:var(--s2);border-radius:999px;height:4px;overflow:hidden}
.pf{height:100%;border-radius:999px;transition:width .3s}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--s1);border:1px solid var(--border);border-radius:var(--rl);
  width:100%;max-width:640px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 30px 80px rgba(0,0,0,.7)}
.mhd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mtitle{font-size:14px;font-weight:700}
.mbd{padding:18px 20px;overflow-y:auto;flex:1}
.mft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.xbtn{background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer;line-height:1}
.xbtn:hover{color:var(--tx)}

/* FORM */
.fi{width:100%;padding:8px 11px;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  color:var(--tx);font-size:13px;transition:border .15s;font-family:inherit}
.fi:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(59,130,246,.1)}
select.fi{cursor:pointer}
textarea.fi{resize:vertical;min-height:64px}
.frow{display:grid;gap:10px}
.c2{grid-template-columns:1fr 1fr}
.c3{grid-template-columns:1fr 1fr 1fr}

/* MISC */
.phd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ptitle{font-size:17px;font-weight:800}
.fbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.alert{padding:10px 14px;border-radius:9px;font-size:13px;display:flex;align-items:center;gap:7px;margin-bottom:12px}
.al-warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.22);color:#fbbf24}
.al-info{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);color:#60a5fa}
.empty{text-align:center;padding:40px;color:var(--tx3);font-size:13px}
.tag-me{font-size:10px;background:rgba(59,130,246,.18);color:#93c5fd;padding:1px 5px;border-radius:4px;margin-left:3px}
.pgr{display:flex;align-items:center;gap:3px;justify-content:flex-end;margin-top:12px}
.pb{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;
  border:1px solid var(--border);cursor:pointer;font-size:12px;background:var(--s2);color:var(--tx2)}
.pb:hover,.pb.active{background:var(--pri);color:#fff;border-color:var(--pri)}
#toast{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:7px}
.toast{padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;
  animation:toIn .2s ease;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.t-ok{background:#064e3b;border:1px solid #065f46;color:#6ee7b7}
.t-err{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5}
.t-warn{background:#451a03;border:1px solid #78350f;color:#fcd34d}
@keyframes toIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.hidden{display:none!important}

/* GANTT */
.gantt-wrap{overflow-x:auto;font-size:12px}
.gantt-hdr{display:flex;border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:4px}
.gantt-label{width:280px;flex-shrink:0;color:var(--tx2);font-weight:600}
.gantt-days{display:flex;flex:1;gap:0}
.gantt-day{flex:1;text-align:center;color:var(--tx3);font-size:10px;min-width:20px}
.gantt-day.today{color:var(--pri);font-weight:700}
.gantt-row{display:flex;align-items:flex-start;padding:4px 0;border-bottom:1px solid rgba(51,65,85,.3)}
.gantt-row:hover{background:var(--row-hover)}
.gantt-row-hl{background:rgba(251,191,36,.1);border-left:3px solid #fbbf24;}
.gm-hover-label:hover{background:rgba(59,130,246,.18)!important;}
.gantt-name{width:280px;flex-shrink:0;overflow:hidden;white-space:normal;word-break:break-all;color:var(--tx);padding-right:8px;font-size:12px;line-height:1.5}
.gantt-track{flex:1;position:relative;height:20px}
.gantt-bar{position:absolute;height:16px;top:2px;border-radius:4px;display:flex;align-items:center;
  padding:0 6px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;
  transition:opacity .15s;cursor:pointer}
.gantt-bar:hover{opacity:.85}
.gantt-today-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(239,68,68,.6);z-index:2}
.type-REQUIREMENT{background:linear-gradient(90deg,#1d4ed8,#3b82f6)}
.type-ISSUE{background:linear-gradient(90deg,#b91c1c,#ef4444)}
.type-ONSITE{background:linear-gradient(90deg,#0e7490,#06b6d4)}
.type-OTHER{background:linear-gradient(90deg,#6d28d9,#8b5cf6)}
.type-risk{background:linear-gradient(90deg,#92400e,#f59e0b)}

/* LOG timeline */
.log-tl{position:relative;padding-left:20px}
.log-tl::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border)}
.log-item{position:relative;margin-bottom:16px}
.log-dot{position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;
  background:var(--pri);border:2px solid var(--bg);z-index:1}
.log-hd{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.log-date{font-size:12px;color:var(--tx2);font-weight:600}
.log-author{font-size:11px;color:var(--tx3)}
.log-body{background:var(--s2);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--tx);line-height:1.6}
.log-prog{font-size:11px;color:var(--tx3);margin-top:4px}

/* TYPE tabs */
.ttabs{display:flex;gap:3px;margin-bottom:16px;background:var(--s2);padding:4px;border-radius:10px;width:fit-content}
.ttab{padding:6px 14px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--tx2);border:none;background:none;transition:all .15s}
.ttab.active{background:var(--pri);color:#fff}

/* APPEARANCE / BG IMAGE */
body.has-bg-img{background-size:cover!important;background-attachment:fixed!important;background-repeat:no-repeat!important;background-position:center!important}
body.has-bg-img .sb{background:rgba(var(--bg-rgb),.88)!important;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
body.has-bg-img .topbar{background:rgba(var(--bg-rgb),.82)!important;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
body.has-bg-img .card{background:rgba(var(--s1-rgb),.82)!important;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
body.has-bg-img .modal{background:rgba(var(--s1-rgb),.92)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
body.has-bg-img .fi,body.has-bg-img .linput,body.has-bg-img .ucard{background:rgba(var(--s2-rgb),.72)!important}
body.has-bg-img .ov{background:rgba(0,0,0,.72)}
body.has-bg-img #lp .lbox{background:rgba(var(--s1-rgb),.9)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.theme-sw{width:48px;height:48px;border-radius:10px;cursor:pointer;border:3px solid transparent;overflow:hidden;display:flex;flex-direction:column;transition:border-color .18s,box-shadow .18s}
.theme-sw:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.sw-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="lp">
  <div class="lbox">
    <div class="llogo">
      <div class="ico">📊</div>
      <h1>团队管理系统</h1>
      <p>请登录您的账号</p>
    </div>
    <div class="fgroup"><label class="flabel">用户名</label>
      <input id="lu" class="linput" placeholder="用户名" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="fgroup"><label class="flabel">密码</label>
      <input id="lp2" class="linput" type="password" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" onclick="doLogin()">登 录</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sb">
    <div class="sb-top">
      <div class="sb-logo"><div class="ico">📊</div><span>团队管理</span></div>
      <div class="ucard">
        <div class="uav" id="sb-av">?</div>
        <div><div class="uname" id="sb-name">-</div><div class="urole" id="sb-role">-</div></div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-bot">
      <button class="ni" onclick="showPage('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>个人设置
      </button>
      <button class="ni" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出
      </button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tb-title" id="tb-title">总览</div>
      <div id="tb-right"></div>
    </header>
    <div class="content" id="ct"></div>
  </div>
</div>
<div id="mw"></div>

<script>
// ════════════════════════════════════════════
// CORE
// ════════════════════════════════════════════
let ME=null, PAGE='dash';

const ICO={
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
  ci:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>',
  task:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
  gantt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>',
  team:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  rpt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
};

async function api(path,opts={}){
  try{
    const r=await fetch('/api'+path,{headers:{'Content-Type':'application/json'},...opts});
    if(r.status===401){showLogin();return null;}
    if(r.status===204) return null;
    const ct=r.headers.get('content-type')||'';
    if(ct.includes('json')){
      const d=await r.json();
      if(!r.ok){toast(d.error||'操作失败','err');return null;}
      return d;
    }
    return await r.blob();
  }catch(e){toast('网络错误','err');return null;}
}
const GET=p=>api(p);
const POST=(p,d)=>api(p,{method:'POST',body:JSON.stringify(d)});
const PUT=(p,d)=>api(p,{method:'PUT',body:JSON.stringify(d)});
const DEL=p=>api(p,{method:'DELETE'});

// ── APPEARANCE ────────────────────────────────────────────────

function applyTheme(id){
  const t=THEMES[id]||THEMES['dark-blue'];
  const root=document.documentElement;
  Object.entries(t.vars).forEach(([k,v])=>root.style.setProperty(k,v));
  localStorage.setItem('tm_theme',id);
  document.querySelectorAll('.sw-item').forEach(el=>{
    const a=el.dataset.theme===id;
    const sw=el.querySelector('.theme-sw');
    if(sw){sw.style.borderColor=a?'var(--pri)':'transparent';sw.style.boxShadow=a?'0 0 0 3px rgba(59,130,246,.3)':'none';}
    const lbl=el.querySelector('span');
    if(lbl) lbl.style.color=a?'var(--pri)':'var(--tx3)';
  });
}
function applyBgImage(dataUrl){
  if(dataUrl){
    document.body.style.backgroundImage='url('+dataUrl+')';
    document.body.classList.add('has-bg-img');
    localStorage.setItem('tm_bg_img',dataUrl);
  } else {
    document.body.style.backgroundImage='';
    document.body.classList.remove('has-bg-img');
    localStorage.removeItem('tm_bg_img');
  }
}
function clearBgImage(){
  applyBgImage(null);
  const wrap=document.getElementById('bg-preview-wrap');
  if(wrap){wrap.style.display='none';}
  const empty=document.getElementById('bg-no-img');
  if(empty) empty.style.display='block';
  toast('背景图已清除');
}
function handleBgUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  if(file.size>8*1024*1024){toast('图片大小请控制在8MB以内','err');return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      applyBgImage(ev.target.result);
      const wrap=document.getElementById('bg-preview-wrap');
      if(wrap){
        const img=wrap.querySelector('img');
        if(img) img.src=ev.target.result;
        wrap.style.display='block';
      }
      const empty=document.getElementById('bg-no-img');
      if(empty) empty.style.display='none';
      toast('背景图已设置');
    }catch(ex){toast('图片太大，无法保存到本地','err');}
  };
  reader.readAsDataURL(file);
}

function pgr(page,pages,fn){
  if(pages<=1)return'';
  let h='<div class="pgr">';
  h+=`<div class="pb" onclick="${fn}(${Math.max(1,page-1)})">‹</div>`;
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1)
      h+=`<div class="pb${i===page?' active':''}" onclick="${fn}(${i})">${i}</div>`;
    else if(Math.abs(i-page)===2) h+='<div class="pb" style="pointer-events:none">…</div>';
  }
  h+=`<div class="pb" onclick="${fn}(${Math.min(pages,page+1)})">›</div>`;
  return h+'</div>';
}
function paginate(rows,page,size=15){
  const pages=Math.ceil(rows.length/size)||1,p=Math.max(1,Math.min(page,pages));
  return{rows:rows.slice((p-1)*size,p*size),page:p,pages,total:rows.length};
}

function sha256hex(msg){
  function n(v){return(v>>>0).toString(16).padStart(8,'0');}
  function r(v,t){return(v>>>t)|(v<<(32-t));}
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var bytes=[];
  for(var i=0;i<msg.length;i++){var c=msg.charCodeAt(i);if(c<128)bytes.push(c);else if(c<2048){bytes.push(192|(c>>6));bytes.push(128|(c&63));}else{bytes.push(224|(c>>12));bytes.push(128|((c>>6)&63));bytes.push(128|(c&63));}}
  var bl=bytes.length*8;bytes.push(0x80);
  while((bytes.length%64)!==56)bytes.push(0);
  for(var i=7;i>=0;i--)bytes.push((bl/Math.pow(2,i*8))&255);
  for(var ch=0;ch<bytes.length;ch+=64){
    var w=[];
    for(var j=0;j<16;j++)w.push((bytes[ch+j*4]<<24)|(bytes[ch+j*4+1]<<16)|(bytes[ch+j*4+2]<<8)|bytes[ch+j*4+3]);
    for(var j=16;j<64;j++){var s0=r(w[j-15],7)^r(w[j-15],18)^(w[j-15]>>>3);var s1=r(w[j-2],17)^r(w[j-2],19)^(w[j-2]>>>10);w.push((w[j-16]+s0+w[j-7]+s1)|0);}
    var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
    for(var j=0;j<64;j++){var S1=r(e,6)^r(e,11)^r(e,25);var ch2=(e&f)^((~e)&g);var t1=(h+S1+ch2+K[j]+w[j])|0;var S0=r(a,2)^r(a,13)^r(a,22);var mj=(a&b)^(a&c)^(b&c);var t2=(S0+mj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}
    H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
  }
  return H.map(n).join('');
}
async function doLogin(){
  var username=document.getElementById('lu').value.trim();
  var password=document.getElementById('lp2').value;
  document.getElementById('lerr').textContent='';
  if(!username||!password){document.getElementById('lerr').textContent='请输入用户名和密码';return;}

}

}

let VIEW_MODE='admin'; // 'admin' | 'member'
let CLIENT_IP=''; // 登录时获取一次，签到时携带

function initApp(){
  showApp();
  VIEW_MODE=ME.is_admin?'admin':'member';
  document.getElementById('sb-av').textContent=ME.name.slice(0,1);
  document.getElementById('sb-name').textContent=ME.name;
  var roleLabel=ME.username==='admin'?'超级管理员':(ME.is_admin?'管理员':(ME.role||'成员'));
  document.getElementById('sb-role').textContent=roleLabel;
  if(ME.is_admin) currentGroup=ME.group_name||'';
  buildNav();
  showPage('dash');
  // 获取客户端 IP，然后自动签到
  GET('/myip').then(function(r){
    if(r&&r.ip) CLIENT_IP=r.ip;
    setTimeout(autoCheckIn, 100);
  });
}

async function autoCheckIn(){
  // 超级管理员 admin 不自动签到
  if(ME.username==='admin') return;
  var ci=await GET('/checkin/today');
  if(ci&&ci.status){
    // 已有签到记录，如果是请假/调休则弹出提示允许修改
    if(ci.status==='LEAVE'||ci.status==='OFF'){
      var labels={'LEAVE':'请假','OFF':'调休'};
      if(confirm('今日状态为【'+( labels[ci.status]||ci.status)+'】，是否修改为出勤或其他状态？')){
        openQuickCiModal();
      }
    }
    // 其他状态（PRESENT/LATE/REMOTE）不打扰
    return;
  }
  // 当天无签到记录，自动签出勤
  var d=await POST('/checkin',{date:today(),status:'PRESENT',memberId:ME.id,clientIp:CLIENT_IP});
  if(d) toast('已自动签到：出勤 ✅');
}

// 快速签到修改弹窗（供自动签到后调整使用）
function openQuickCiModal(){
  var opts=['PRESENT','REMOTE','LATE','LEAVE','OFF'].map(function(s){
    var labels={PRESENT:'出勤',REMOTE:'远程',LATE:'迟到',LEAVE:'请假',OFF:'调休'};
    return '<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:var(--s2)">'
      +'<input type="radio" name="qci-status" value="'+s+'" style="accent-color:var(--pri)"'+(s==='PRESENT'?' checked':'')+'>'+labels[s]+'</label>';
  }).join('');
  openModal('修改今日签到状态',
    '<div style="display:flex;flex-direction:column;gap:8px">'+opts+'</div>'
    +'<div style="margin-top:12px"><label class="flabel">备注</label><input id="qci-remark" class="fi" placeholder="选填"></div>',
    async function(){
      var status=document.querySelector('input[name="qci-status"]:checked');
      if(!status)return;
      var d=await POST('/checkin',{date:today(),status:status.value,remark:document.getElementById('qci-remark').value,memberId:ME.id,clientIp:CLIENT_IP});
      if(d){toast('签到状态已更新：'+status.value);closeModal();}
    }
  );
}

function buildNav(){
  var nav=document.getElementById('sb-nav');
  var adminMenus=[
    {k:'dash',l:'总览',i:'dash'},{k:'ci',l:'签到管理',i:'ci'},
    {k:'tasks',l:'任务管理',i:'task'},{k:'member-view',l:'成员视图',i:'team'},

    {k:'team',l:'成员管理',i:'team'},{k:'reports',l:'报表中心',i:'rpt'},
    {k:'help',l:'操作说明',i:'rpt'}
  ];
  var memberMenus=[
    {k:'dash',l:'我的工作台',i:'dash'},{k:'my-ci',l:'我的签到',i:'ci'},
    {k:'my-tasks',l:'我的任务',i:'task'},{k:'gantt',l:'甘特图',i:'gantt'},
    {k:'monthly',l:'月度日历',i:'task'},{k:'team-view',l:'团队视图',i:'team'},
    {k:'help',l:'操作说明',i:'rpt'}
  ];
  var isAdminView=ME.is_admin&&VIEW_MODE==='admin';
  var menus=isAdminView?adminMenus:memberMenus;
  var btns=menus.map(function(m){
    return '<button class="ni" id="ni-'+m.k+'" onclick="showPage(\''+m.k+'\')">'+(ICO[m.i]||'')+' '+m.l+'</button>';
  }).join('');
  // 管理员在底部加切换按钮
  if(ME.is_admin){
    var switchLabel=VIEW_MODE==='admin'?'切换到成员视图':'切换到管理员视图';
    var switchIcon=VIEW_MODE==='admin'?ICO['team']:ICO['dash'];
    btns+='<button class="ni" onclick="toggleViewMode()" style="margin-top:8px;border-top:1px solid var(--border);color:var(--acc);opacity:.85">'+(switchIcon||'')+'  '+switchLabel+'</button>';
  }
  nav.innerHTML=btns;
}

function toggleViewMode(){
  VIEW_MODE=VIEW_MODE==='admin'?'member':'admin';
  buildNav();
  showPage('dash');
}

function showPage(name){
  PAGE=name;
  document.querySelectorAll('.ni').forEach(function(e){e.classList.remove('active');});
  var btn=document.getElementById('ni-'+name);if(btn)btn.classList.add('active');
  var isAdminView=ME.is_admin&&VIEW_MODE==='admin';
  var map=isAdminView?{
    dash:renderAdminDash,ci:renderCi,tasks:renderTasks,team:renderTeam,reports:renderReports,
    profile:renderProfile,'member-view':renderMemberView,'admin-gantt':renderAdminGantt,monthly:renderMonthly,help:renderHelp
  }:{
    dash:renderMemberDash,'my-ci':renderMyCi,'my-tasks':renderMyTasks,gantt:renderGantt,
    'team-view':renderTeamView,profile:renderProfile,monthly:renderMonthly,help:renderHelp
  };
  (map[name]||(isAdminView?renderAdminDash:renderMemberDash))();
}

async function exportTodayTodo(){
  const todos=await GET('/tasks/today_todo')||[];
  if(!todos.length){toast('今日暂无待办','warn');return;}
  const lines2=['今日待办事项 - '+today(),''];
  todos.forEach((t,ix)=>{
    lines2.push((ix+1)+'. ['+(TZ[t.task_type]||t.task_type)+'] '+t.title);
    lines2.push('   负责人: '+(t.assignee_name||'未指定'));
    lines2.push('   时间段: '+t.plan_start_date+' ~ '+t.plan_end_date+' | 进度: '+(t.progress||0)+'%');
    lines2.push('   今日状态: '+(t.has_today_log?'✓ 已有进展记录':'⚠ 尚未记录今日进展'));
    lines2.push('');
  });
  const blob=new Blob([lines2.join('\n')],{type:'text/plain;charset=utf-8'});
  dlBlob(blob,'今日待办_'+today()+'.txt');
}

async function quickCI(status){
  // Members: PRESENT/LATE auto-detected server-side; LEAVE/REMOTE/ABSENT are explicit overrides
  const d=await POST('/checkin',{date:today(),status,memberId:ME.id,clientIp:CLIENT_IP});

    toast(label); renderMemberDash();
  }
}

    </td>

  }).join('')||'<tr><td colspan="11" class="empty">暂无数据</td></tr>'}
  </tbody></table></div></div>`;
}

// 点击迟到天数弹出迟到明细
async function showLateDetail(memberId, memberName, year, month){
  const recs=await GET('/checkin/member/'+memberId+'?year='+year+'&month='+month)||[];
  const lateRecs=recs.filter(r=>r.status==='LATE');
  if(!lateRecs.length){toast('本月无迟到记录');return;}
  const rows=lateRecs.map(r=>{
    const t=r.check_in_time?r.check_in_time.slice(11,16):'--:--';
    const ip=r.ip_address?`<span style="font-size:11px;font-family:monospace;color:var(--tx2)">${esc(r.ip_address)}</span>`:'<span style="color:var(--tx3)">-</span>';
    return`<tr><td>${r.check_date}</td><td>${sbadge('LATE')}</td><td><strong style="color:var(--warn)">${t}</strong></td><td>${ip}</td><td>${esc(r.remark||'-')}</td></tr>`;
  }).join('');
  openModal(memberName+' '+year+'年'+month+'月迟到明细',
    `<div class="twrap"><table><thead><tr><th>日期</th><th>状态</th><th>打卡时间</th><th>签到IP</th><th>备注</th></tr></thead><tbody>${rows}</tbody></table></div>`,
    null);
}

// 查看全部签到记录

  if(!recs.length){toast('本月暂无签到记录','warn');return;}
  const rows=recs.map(r=>{
    const t=r.check_in_time?r.check_in_time.slice(11,16):'--:--';
    const ip=r.ip_address?`<span style="font-size:11px;font-family:monospace;color:var(--tx2)">${esc(r.ip_address)}</span>`:'<span style="color:var(--tx3)">-</span>';
    return`<tr><td>${r.check_date}</td><td>${sbadge(r.status)}</td><td>${t}</td><td>${ip}</td><td>${esc(r.remark||'-')}</td></tr>`;
  }).join('');
  openModal(memberName+' '+ciY+'年'+ciM+'月签到记录',
    `<div class="twrap"><table><thead><tr><th>日期</th><th>状态</th><th>打卡时间</th><th>签到IP</th><th>备注</th></tr></thead><tbody>${rows}</tbody></table></div>`,
    null);
}

function openCiSettings(){

  openModal('签到设置',`
  <div class="alert al-info" style="margin-bottom:14px">
    设置迟到判定时间点，精确到分钟。晚于该时间签到自动标记为"迟到"。

    <input id="cfg-threshold" class="fi" type="time" value="${threshold}">

      当前设置：晚于 <strong>${threshold}</strong> 签到 = 迟到

  </div>`,
  async()=>{
    const val=gv('cfg-threshold');
    if(!val){toast('请填写时间','err');return;}
    const res=await POST('/config',{late_threshold:val});
    if(res){
      ciConfig.late_threshold=val;
      toast(`迟到判定时间已更新为 ${val}`);
      closeModal();loadGroupCi();
    }
  });
}

let taskTab='REQUIREMENT', taskPage=1, taskFilter='';
async function renderMyTasks(){
  document.getElementById('tb-title').textContent='我的任务';
  renderTaskList(false);
}
async function renderTasks(){
  document.getElementById('tb-title').textContent='任务管理';
  renderTaskList(true);
}

function renderTaskList(isAdmin){
  document.getElementById('ct').innerHTML=`
  <div class="phd">
    <div class="ptitle">${isAdmin?'📋 任务管理':'📋 我的任务'}</div>
    <div style="display:flex;gap:7px">
      ${isAdmin?`<button class="btn" onclick="exportTasks()">↓ 导出</button>`:''}
      <button class="btn btn-pri" onclick="openTaskModal(null)">＋ 新建任务</button>
    </div>
  </div>
  <div class="ttabs">
    ${[['REQUIREMENT','需求'],['ISSUE','问题单'],['ONSITE','现场支撑'],['OTHER','其他事务']].map(([t,l])=>`
      <button class="ttab${taskTab===t?' active':''}" onclick="taskTab='${t}';taskPage=1;loadTaskTable(${isAdmin})">${l}</button>`).join('')}
  </div>
  <div id="task-stats" class="sgrid" style="grid-template-columns:repeat(4,1fr)"></div>
  <div class="card">
    <div class="fbar">
      <select class="fi" style="width:120px" id="task-sf" onchange="taskPage=1;taskFilter=this.value;loadTaskTable(${isAdmin})">
        <option value="">全部状态</option>
        <option value="PENDING">待处理</option><option value="IN_PROGRESS">进行中</option>
        <option value="ONGOING">进行中</option><option value="TESTING">测试中</option>
        <option value="DELIVERED">已交付</option><option value="COMPLETED">已完成</option>
        <option value="RESOLVED">已解决</option>
      </select>
      <span style="color:var(--tx3);font-size:13px" id="task-count"></span>
    </div>
    <div id="task-table">加载中...</div>
  </div>`;
  loadTaskTable(isAdmin);
}

async function loadTaskTable(isAdmin, page){
  taskPage=page||taskPage;
  // Sync tab button active state
  document.querySelectorAll('.ttab').forEach(btn=>{
    const t=btn.getAttribute('onclick')||'';
    const match=t.match(/taskTab='(\w+)'/);
    if(match) btn.classList.toggle('active', match[1]===taskTab);
  });
  const endpoint=isAdmin?`/tasks?type=${taskTab}`:`/tasks/mine?type=${taskTab}`;
  const all=await GET(endpoint)||[];
  const filtered=taskFilter?all.filter(t=>t.status===taskFilter):all;
  const ct=document.getElementById('task-count');
  if(ct)ct.textContent=`共 ${filtered.length} 条`;
  const statsEl=document.getElementById('task-stats');
  if(statsEl){
    const done=['DELIVERED','COMPLETED','RESOLVED','CLOSED'];
    statsEl.innerHTML=`
    <div class="sc sc-blue"><div class="sl">总计</div><div class="sv">${all.length}</div></div>
    <div class="sc sc-teal"><div class="sl">进行中</div><div class="sv">${all.filter(t=>['IN_PROGRESS','ONGOING','TESTING'].includes(t.status)).length}</div></div>
    <div class="sc sc-green"><div class="sl">已完成</div><div class="sv">${all.filter(t=>done.includes(t.status)).length}</div></div>
    <div class="sc sc-amber"><div class="sl">有风险</div><div class="sv">${all.filter(t=>t.has_risk&&!done.includes(t.status)).length}</div></div>`;
  }
  const {rows,page:p,pages}=paginate(filtered,taskPage);
  let cols='';
  if(taskTab==='REQUIREMENT') cols=`<th>负责人</th><th>状态</th><th>进度</th><th>计划结束</th><th>交付月</th><th>风险</th>`;
  else if(taskTab==='ISSUE') cols=`<th>严重度</th><th>负责人</th><th>状态</th><th>计划解决</th><th>超期</th>`;
  else if(taskTab==='ONSITE') cols=`<th>地点</th><th>负责人</th><th>状态</th><th>开始</th><th>结束</th>`;
  else cols=`<th>负责人</th><th>状态</th><th>进度</th><th>计划结束</th>`;
  document.getElementById('task-table').innerHTML=`
  <table><thead><tr><th>标题</th>${cols}<th>操作</th></tr></thead><tbody>
  ${rows.map(t=>{
    const isMe=t.assignee_id===ME.id||t.created_by===ME.id;
    let cells='';
    if(taskTab==='REQUIREMENT') cells=`<td>${esc(t.assignee_name||'')}</td><td>${sbadge(t.status)}</td>
      <td style="min-width:80px"><div class="prog"><div class="pf" style="width:${t.progress||0}%;background:${t.has_risk?'var(--err)':'var(--pri)'}"></div></div><small style="color:var(--tx3)">${t.progress||0}%</small></td>
      <td style="color:${t.plan_end_date&&t.plan_end_date<today()&&t.status!=='DELIVERED'?'var(--err)':'inherit'}">${t.plan_end_date||'-'}</td>
      <td>${t.delivery_month||'-'}</td>
      <td>${t.has_risk&&!['DELIVERED','CANCELLED'].includes(t.status)?`<span style="color:var(--warn);font-size:11px">⚠ ${esc((t.risk_description||'').slice(0,12))}</span>`:'<span style="color:var(--tx3)">正常</span>'}`;
    else if(taskTab==='ISSUE') cells=`<td><span class="bd ${SEV[t.severity]||'bd-gray'}">${t.severity||''}</span></td>
      <td>${esc(t.assignee_name||'')}</td><td>${sbadge(t.status)}</td>
      <td style="color:${t.plan_end_date&&t.plan_end_date<today()&&!['RESOLVED','CLOSED'].includes(t.status)?'var(--err)':'inherit'}">${t.plan_end_date||'-'}</td>
      <td>${t.plan_end_date&&t.plan_end_date<today()&&!['RESOLVED','CLOSED','REJECTED'].includes(t.status)?'<span class="bd bd-red">超期</span>':''}`;
    else if(taskTab==='ONSITE') cells=`<td>${esc(t.location||'')}</td><td>${esc(t.assignee_name||'')}</td><td>${sbadge(t.status)}</td><td>${t.plan_start_date||'-'}</td><td>${t.plan_end_date||'-'}`;
    else cells=`<td>${esc(t.assignee_name||'')}</td><td>${sbadge(t.status)}</td>
      <td><div class="prog"><div class="pf" style="width:${t.progress||0}%;background:var(--pri)"></div></div><small style="color:var(--tx3)">${t.progress||0}%</small></td>
      <td>${t.plan_end_date||'-'}`;
    return`<tr ${isMe?'class="hi"':''}>
      <td style="max-width:160px"><strong>${t.has_risk&&!['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status)?'⚠️ ':''}</strong>
        ${isMe?'<span class="tag-me">我</span> ':''}${esc(t.title)}</td>
      ${cells}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" onclick="openTaskModal(${t.id})">编辑</button>
        <button class="btn btn-sm" onclick="openLogPanel(${t.id})">📝 日志</button>
        ${ME.is_admin||t.created_by===ME.id?`<button class="btn btn-sm btn-err" onclick="delTask(${t.id})">删</button>`:''}
      </td>
    </tr>`;
  }).join('')||'<tr><td colspan="8" class="empty">暂无任务，点击"新建任务"开始</td></tr>'}
  </tbody></table>${pgr(p,pages,`(function(pg){taskPage=pg;loadTaskTable(${isAdmin})})`)}`;
}

// TASK MODAL
// ════════════════════════════════════════════
async function openTaskModal(id){
  const members=await GET('/members/active')||[];
  let t={task_type:taskTab,status:'PENDING',priority:'MEDIUM',group_name:ME.group_name};
  if(id){const all=await GET('/tasks?type='+taskTab)||[];t=all.find(x=>x.id===id)||t;
         if(!t.id){const mine=await GET('/tasks/mine?type='+taskTab)||[];t=mine.find(x=>x.id===id)||t;}}
  const memOpts=members.filter(m=>!m.is_admin).map(m=>`<option value="${m.id}" ${t.assignee_id==m.id?'selected':''}>${esc(m.name)}</option>`).join('');
  const isIssue=taskTab==='ISSUE', isOnsite=taskTab==='ONSITE';
  const statuses=isIssue?['OPEN','IN_PROGRESS','RESOLVED','CLOSED','REJECTED']:
                 (taskTab==='REQUIREMENT'?['PENDING','IN_PROGRESS','TESTING','DELIVERED','CANCELLED']:
                  ['PENDING','ONGOING','COMPLETED','CANCELLED']);

  openModal(id?'编辑任务':'新建任务',`
  <form id="tf">
  <div class="fgroup"><label class="flabel">任务标题 <span class="req">*</span></label>
    <input id="tf-title" class="fi" value="${esc(t.title||'')}" required></div>
  <div class="fgroup"><label class="flabel">描述</label>
    <textarea id="tf-desc" class="fi">${esc(t.description||'')}</textarea></div>
  <div class="frow c3">
    <div class="fgroup"><label class="flabel">状态</label>
      <select id="tf-status" class="fi">${statuses.map(s=>`<option value="${s}"${t.status===s?' selected':''}>${SZ[s]||s}</option>`).join('')}</select></div>
    <div class="fgroup"><label class="flabel">优先级</label>
      <select id="tf-pri" class="fi">${['LOW','MEDIUM','HIGH','CRITICAL'].map(p=>`<option${t.priority===p?' selected':''}>${p}</option>`).join('')}</select></div>
    ${isIssue?`<div class="fgroup"><label class="flabel">严重度</label>
      <select id="tf-sev" class="fi">${['LOW','MEDIUM','HIGH','CRITICAL'].map(s=>`<option${t.severity===s?' selected':''}>${s}</option>`).join('')}</select></div>`
    :`<div class="fgroup"><label class="flabel">进度(%)</label>
      <input id="tf-prog" class="fi" type="number" min="0" max="100" value="${t.progress||0}"></div>`}
  </div>
  <div class="frow c2">
    <div class="fgroup"><label class="flabel">负责人（默认为自己）</label>
      <select id="tf-aid" class="fi" onchange="document.getElementById('tf-an').value=this.options[this.selectedIndex].text">
        <option value="">请选择</option>${memOpts}
      </select></div>
    ${isOnsite?`<div class="fgroup"><label class="flabel">现场地点</label>
      <input id="tf-loc" class="fi" value="${esc(t.location||'')}"></div>`
    :`<div class="fgroup"><label class="flabel">交付月份</label>
      <input id="tf-dm" class="fi" type="month" value="${t.delivery_month||''}"></div>`}
  </div>
  <div class="frow c3">
    <div class="fgroup"><label class="flabel">计划开始 <span class="req">*</span></label><input id="tf-psd" class="fi" type="date" value="${t.plan_start_date||''}"></div>
    <div class="fgroup"><label class="flabel">计划${isIssue?'解决':'结束'} <span class="req">*</span></label><input id="tf-ped" class="fi" type="date" value="${t.plan_end_date||''}"></div>
    <div class="fgroup"><label class="flabel">实际完成</label><input id="tf-aed" class="fi" type="date" value="${t.actual_end_date||''}"></div>
  </div>
  <div class="frow c3">
    <div class="fgroup"><label class="flabel">预估天数</label><input id="tf-est" class="fi" type="number" min="0" placeholder="工作日" value="${t.estimated_days||0}"></div>
    <div class="fgroup"><label class="flabel">模块</label><input id="tf-mod" class="fi" value="${esc(t.module||'')}"></div>
    <div class="fgroup"><label class="flabel">版本</label><input id="tf-ver" class="fi" value="${esc(t.version||'')}"></div>
  </div>
  <div class="frow c2">
    <div class="fgroup"><label class="flabel">风险</label>
      <select id="tf-risk" class="fi"><option value="0" ${!t.has_risk?'selected':''}>无</option><option value="1" ${t.has_risk?'selected':''}>有风险</option></select></div>
    <div class="fgroup"><label class="flabel">风险描述</label><input id="tf-rdesc" class="fi" value="${esc(t.risk_description||'')}"></div>
  </div>
  <input id="tf-an" type="hidden" value="${esc(t.assignee_name||'')}">
  <input id="tf-gn" type="hidden" value="${esc(t.group_name||ME.group_name)}">
  <input id="tf-type" type="hidden" value="${taskTab}">
  </form>`,async()=>{
    const title=gv('tf-title');
    if(!title){toast('标题必填','err');return;}
    var _psd=gv('tf-psd'),_ped=gv('tf-ped');
    if(!_psd||!_ped){toast('计划开始和结束日期必填','err');return;}
    if(_psd>_ped){toast('开始日期不能晚于结束日期','err');return;}
    const payload={
      title,description:gv('tf-desc'),task_type:gv('tf-type'),
      status:gv('tf-status'),priority:gv('tf-pri'),
      severity:gv('tf-sev')||null,
      assignee_id:gv('tf-aid')||null,assignee_name:gv('tf-an'),
      delivery_month:gv('tf-dm')||null,location:gv('tf-loc')||null,
      plan_start_date:gv('tf-psd')||null,plan_end_date:gv('tf-ped')||null,
      actual_end_date:gv('tf-aed')||null,
      progress:parseInt(gv('tf-prog'))||0,
      estimated_days:parseInt(gv('tf-est'))||0,
      has_risk:parseInt(gv('tf-risk'))||0,risk_description:gv('tf-rdesc'),
      module:gv('tf-mod'),version:gv('tf-ver'),
      group_name:gv('tf-gn')||ME.group_name,
    };
    const res=id?await PUT('/tasks/'+id,payload):await POST('/tasks',payload);
    if(res){toast(id?'更新成功':'创建成功');closeModal();
      ME.is_admin?loadTaskTable(true):loadTaskTable(false);}
  },true);
}

async function delTask(id){
  if(!confirm('确认删除？'))return;
  await DEL('/tasks/'+id);toast('已删除');
  ME.is_admin?loadTaskTable(true):loadTaskTable(false);
}
async function exportTasks(){
  const sm=yearStart(),em=thisMonth();
  const blob=await fetch(`/api/export/tasks/${encodeURIComponent(ME.group_name)}?type=${taskTab}&startMonth=${sm}&endMonth=${em}`).then(r=>r.blob());
  dlBlob(blob,`${TZ[taskTab]||taskTab}报表.xlsx`);
}

  document.getElementById('mw').innerHTML=`
  <div class="ov" id="mov">
    <div class="modal" style="max-width:680px">

async function submitLog(tid){
  const content=gv('lg-content').trim();
  if(!content){toast('请填写工作内容','err');return;}
  const prog=gv('lg-prog'); const stat=gv('lg-status');
  const payload={content,log_date:gv('lg-date')};
  if(prog!=='') payload.progress=parseInt(prog);
  if(stat) payload.status=stat;
  const res=await POST('/tasks/'+tid+'/logs',payload);
  if(res){toast('进展已记录');openLogPanel(tid);}
}

let ganttYear=new Date().getFullYear(), ganttMonth=new Date().getMonth()+1;
async function renderGantt(){
  document.getElementById('tb-title').textContent='甘特图';
  document.getElementById('ct').innerHTML=`

      <select class="fi" style="width:78px" onchange="ganttMonth=this.value?parseInt(this.value):null;loadGantt()">
        <option value="">全年</option>
        ${Array.from({length:12},(_,i)=>`<option value="${i+1}"${i+1===ganttMonth?' selected':''}>${i+1}月</option>`).join('')}
      </select>
    </div>
  </div>
  <div id="gantt-ct">加载中...</div>`;
  loadGantt();
}

async function loadGantt(){
  const params=ganttMonth?`year=${ganttYear}&month=${ganttMonth}`:`year=${ganttYear}`;
  const tasks=await GET(`/tasks/gantt?${params}&member_id=${ME.id}`)||[];
  if(!tasks.length){
    document.getElementById('gantt-ct').innerHTML=`<div class="card"><div class="empty">暂无设置了计划日期的任务<br><small>在任务编辑中设置"计划开始"和"计划结束"日期</small></div></div>`;
    return;
  }
  // Build date range
  const startDate=ganttMonth?new Date(ganttYear,ganttMonth-1,1):new Date(ganttYear,0,1);
  const endDate=ganttMonth?new Date(ganttYear,ganttMonth,0):new Date(ganttYear,11,31);
  const totalDays=Math.ceil((endDate-startDate)/(86400000))+1;
  const todayD=new Date(today());
  const todayOff=Math.ceil((todayD-startDate)/86400000);

  // Build day headers
  const dayStep=ganttMonth?1:Math.ceil(totalDays/30);
  let dayHdrs='';
  for(let d=0;d<totalDays;d+=dayStep){
    const dt=new Date(startDate); dt.setDate(dt.getDate()+d);
    const isToday=dt.toISOString().slice(0,10)===today();
    const lbl=ganttMonth?dt.getDate():(dt.getMonth()+1)+'/'+dt.getDate();
    dayHdrs+=`<div class="gantt-day${isToday?' today':''}" style="flex:${dayStep};min-width:${ganttMonth?'20px':'24px'}">${lbl}</div>`;
  }

  const COLORS={'REQUIREMENT':'#1d4ed8','ISSUE':'#b91c1c','ONSITE':'#0e7490','OTHER':'#6d28d9'};

  const rows=tasks.map(t=>{
    const ts=new Date(t.plan_start_date), te=new Date(t.plan_end_date);
    const startOff=Math.max(0,Math.ceil((ts-startDate)/86400000));
    const endOff=Math.min(totalDays-1,Math.ceil((te-startDate)/86400000));
    const barLeft=(startOff/totalDays*100).toFixed(2);
    const barWidth=((endOff-startOff+1)/totalDays*100).toFixed(2);
    const color=t.has_risk&&!['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status)?'#92400e':COLORS[t.task_type]||'#475569';
    const done=['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status);
    return`<div class="gantt-row" onclick="openLogPanel(${t.id})" style="cursor:pointer">
      <div class="gantt-name" title="${esc(t.title)}">${tbadge(t.task_type)} ${esc(t.title)}</div>
      <div class="gantt-track">
        <div class="gantt-bar" style="left:${barLeft}%;width:${barWidth}%;background:${done?'#047857':color};opacity:${done?.7:1}"
          title="${esc(t.title)} | ${t.plan_start_date} ~ ${t.plan_end_date} | ${t.progress||0}%">
          ${t.progress||0}%
        </div>
        ${todayOff>=0&&todayOff<totalDays?`<div class="gantt-today-line" style="left:${(todayOff/totalDays*100).toFixed(2)}%"></div>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('gantt-ct').innerHTML=`
  <div class="card">
    <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;font-size:12px">
      ${Object.entries(TZ).map(([k,v])=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:${COLORS[k]};display:inline-block"></span>${v}</span>`).join('')}
      <span style="display:flex;align-items:center;gap:4px"><span style="width:12px;height:12px;border-radius:3px;background:#92400e;display:inline-block"></span>有风险</span>
      <span style="color:var(--tx3)">· 点击任务行可查看/添加日志</span>
    </div>
    <div class="gantt-wrap">
      <div class="gantt-hdr">
        <div class="gantt-label">任务</div>
        <div class="gantt-days">${dayHdrs}</div>
      </div>
      ${rows}
    </div>
  </div>`;
}

async function delMem(id,hardDelete){
  if(hardDelete){
    if(!confirm('确认永久删除该成员？此操作不可恢复')) return;
    var res=await fetch('/api/members/'+id+'/delete',{method:'DELETE'});
    if(res.ok){toast('已永久删除');loadTeam();}
    else{var d=await res.json();toast(d.error||'删除失败','err');}
  }else{
    if(!confirm('确认停用该成员？'))return;
    await DEL('/members/'+id);toast('已停用');loadTeam();
  }
}

async function loadMemberView(){
  const mids=mvSelMembers.length?mvSelMembers.join(','):'';

  <div class="mv-grid" style="${gridStyle}">
  ${data.map(({member,tasks})=>{
    const activeTasks=tasks.filter(t=>!['DELIVERED','COMPLETED','RESOLVED','CLOSED','CANCELLED','REJECTED'].includes(t.status));

        <span style="font-size:11px;color:var(--tx3)">${esc(member.role||'')}</span>
        <span style="margin-left:auto;font-size:11px">${activeTasks.length}个进行中</span>
        ${mvDate?`<span class="bd ${dateLogs.length>0?'bd-green':'bd-amber'}" style="font-size:10px">${dateLogs.length>0?'当日有进展':'当日无进展'}</span>`
        :`<span class="bd ${todayLogs.length>0?'bd-green':'bd-amber'}" style="font-size:10px">${todayLogs.length}个今日有进展</span>`}

        ${activeTasks.map(t=>{
          const checkDate=mvDate||today();

            <div style="flex:1;min-width:0">
              <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${tbadge(t.task_type)} ${esc(t.title)}</div>
              <div style="font-size:11px;color:var(--tx2);margin-top:2px">${sbadge(t.status)} 进度${t.progress||0}% · ${t.plan_end_date||'无截止'}</div>
              ${recentLogs.length>0&&hasLog?`<div style="font-size:11px;color:var(--ok);margin-top:2px">📝 ${esc((recentLogs[0].content||'').slice(0,40))}</div>`:''}
            </div>
            <span class="bd ${hasLog?'bd-green':'bd-amber'}" style="flex-shrink:0;font-size:10px">${hasLog?'✓':'⚠'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')||'<div class="empty">暂无数据</div>'}
  </div>`;
}

function selectAllAgMembers(){
  agShowAll=true; agMembers=[];
  agAllMembers.forEach(function(m){agMembers.push(m.id);});
  document.querySelectorAll('#ag-filter input').forEach(function(cb){cb.checked=true;});
  loadAdminGantt();
}

// 点击分组按钮：选中该组所有成员（切换：全选→全不选）
function selectGroupMembers(groupName){
  agShowAll=false;
  var ids=agAllMembers.filter(function(m){return m.group_name===groupName;}).map(function(m){return m.id;});
  var allSel=ids.every(function(id){return agMembers.includes(id);});
  if(allSel){
    // 全部已选则取消该组
    agMembers=agMembers.filter(function(id){return !ids.includes(id);});
  }else{
    // 否则选中该组所有成员
    ids.forEach(function(id){if(!agMembers.includes(id))agMembers.push(id);});
  }
  if(agMembers.length===0) agShowAll=false;
  renderAdminGantt();
}

function toggleAgMember(mid,checked){
  if(checked){if(!agMembers.includes(mid))agMembers.push(mid);}
  else agMembers=agMembers.filter(x=>x!==mid);
  loadAdminGantt();
}

// Render gantt tracks - unified bar color (no task-type color)
function renderGanttTracks(tasks,start,end,totalDays,todayOff,dayStep,agMonth,highlightDate){
  var out='';
  for(var i=0;i<tasks.length;i++){
    var t=tasks[i];
    var ts=new Date(t.plan_start_date),te=new Date(t.plan_end_date);
    var so=Math.max(0,Math.ceil((ts-start)/86400000));
    var eo=Math.min(totalDays-1,Math.ceil((te-start)/86400000));
    var bl=(so/totalDays*100).toFixed(2),bw=Math.max(0.5,(eo-so+1)/totalDays*100).toFixed(2);
    var done=['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status);
    var color=done?'#047857':(t.has_risk?'#dc2626':'#3b82f6');
    var ld=t.log_dates||[];
    var noLog=!done&&todayOff>=0&&todayOff<totalDays&&!ld.includes(today());
    var hlRow=highlightDate&&ld.includes(highlightDate);
    var rc='gantt-row'+(noLog?' gantt-row-no-log':'')+(hlRow?' gantt-row-hl':'');
    var mk='';
    for(var j=0;j<ld.length;j++){
      var off=Math.ceil((new Date(ld[j])-start)/86400000);
      if(off<0||off>=totalDays) continue;
      var bg=ld[j]===highlightDate?'rgba(251,191,36,.85)':'rgba(16,185,129,.55)';
      mk+='<div style="position:absolute;left:'+(off/totalDays*100).toFixed(2)+'%;top:0;width:'+Math.max(0.8,(1/totalDays*100)).toFixed(2)+'%;height:100%;background:'+bg+';z-index:3;pointer-events:none" title="'+ld[j]+'"></div>';
    }
    var tl=todayOff>=0&&todayOff<totalDays?'<div class="gantt-today-line" style="left:'+(todayOff/totalDays*100).toFixed(2)+'%"></div>':'';
    var safe=esc(t.title||'');
    var lm={};(t.logs||[]).forEach(function(l){if(!lm[l.log_date])lm[l.log_date]=[];lm[l.log_date].push(l.content);});
    var lmj=JSON.stringify(lm).replace(/"/g,'&quot;');
    var ldj=JSON.stringify(ld).replace(/"/g,'&quot;');
    out+='<div class="'+rc+'" data-tid="'+t.id+'" data-title="'+safe+'" data-ld="'+ldj+'" data-lm="'+lmj+'"'
      +' onmouseenter="ganttTipFromData(event,this)" onmouseleave="hideGanttTip()"'
      +' onclick="openLogPanel('+t.id+')" style="cursor:pointer">'
      +'<div class="gantt-name" title="'+safe+'">'+tbadge(t.task_type)+' '+safe+'</div>'
      +'<div class="gantt-track">'
      +'<div class="gantt-bar" style="left:'+bl+'%;width:'+bw+'%;background:'+color+';opacity:'+(done?0.65:1)+'" title="'+safe+'">'+(t.progress||0)+'%'+(t.estimated_days?' (预估'+t.estimated_days+'天)':'')+'</div>'
      +mk+tl+'</div></div>';
  }
  return out;
}
function ganttTipFromData(event,el){
  var tid=parseInt(el.dataset.tid);
  var title=el.dataset.title||'';
  var ld=[];try{ld=JSON.parse(el.dataset.ld||'[]');}catch(e){}
  var lm={};try{lm=JSON.parse(el.dataset.lm||'{}');}catch(e){}
  showGanttTip(event,tid,title,ld,lm);
}

function buildDayHeaders(start, totalDays, dayStep, agMonth){
  let hdrs='';
  for(let d=0;d<totalDays;d+=dayStep){
    const dt=new Date(start); dt.setDate(dt.getDate()+d);
    const isToday=dt.toISOString().slice(0,10)===today();
    const lbl=agMonth?dt.getDate():(dt.getMonth()+1)+'/'+dt.getDate();
    hdrs+=`<div class="gantt-day${isToday?' today':''}" style="flex:${dayStep};min-width:${agMonth?'18px':'22px'}">${lbl}</div>`;
  }
  return hdrs;
}

const GANTT_LEGEND='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;font-size:12px">'+'<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#3b82f6"></span> 进行中</span>'+'<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#047857"></span> 已完成</span>'+'<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#dc2626"></span> 有风险</span>'+'<span><span style="display:inline-block;width:6px;height:14px;background:rgba(16,185,129,.55);vertical-align:middle"></span> 有进展</span>'+'<span><span style="display:inline-block;width:6px;height:14px;background:rgba(251,191,36,.85);vertical-align:middle"></span> 高亮日</span>'+'</div>';

async function loadAdminGantt(){
  if(!agShowAll&&agMembers.length===0){document.getElementById('ag-content').innerHTML='<div class="empty" style="padding:40px">未选择任何成员</div>';return;}
  var mids=(!agShowAll||agMembers.length)?agMembers.join(','):'';
  var gn=agFilterGroup||currentGroup||ME.group_name;
  // 如果 gn 为空（旧数据库 admin 无组），自动取第一个活跃成员的组
  if(!gn){
    const allM=await GET('/members/active')||[];
    const first=allM.find(function(m){return m.group_name;});
    if(first) gn=first.group_name;
  }
  if(!gn){document.getElementById('ag-content').innerHTML='<div class="empty" style="padding:40px">暂无成员数据，请先在成员管理中添加成员并设置所在组</div>';return;}
  var params='year='+agYear+(agMonth?'&month='+agMonth:'')+'&group_name='+encodeURIComponent(gn)+(mids?'&member_ids='+mids:'');
  var data=await GET('/tasks/gantt_multi?'+params); if(!data)return;
  var members=data.members,startDate=data.startDate,endDate=data.endDate;
  var start=new Date(startDate),end=new Date(endDate);
  var totalDays=Math.ceil((end-start)/86400000)+1;
  var todayOff=Math.ceil((new Date(today())-start)/86400000);
  var dayStep=agMonth?1:Math.ceil(totalDays/30);
  var dayHdrs=buildDayHeaders(start,totalDays,dayStep,agMonth);
  var DONE=['DELIVERED','COMPLETED','RESOLVED','CLOSED'];
  var selCnt=agShowAll?members.length:agMembers.length;
  var isSingle=selCnt===1;
  var html='',slHtml='';

  // 按 group_name 分组
  var groupMap={}, groupOrder=[];
  for(var mi=0;mi<members.length;mi++){
    var gn2=members[mi].member.group_name||'未分组';
    if(!groupMap[gn2]){groupMap[gn2]=[];groupOrder.push(gn2);}
    groupMap[gn2].push(members[mi]);
  }

  for(var gi=0;gi<groupOrder.length;gi++){
    var grpName=groupOrder[gi];
    var grpItems=groupMap[grpName];

    // 组标题行（多个组时才显示）
    if(groupOrder.length>1){
      html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;margin-top:'+(gi===0?'0':'14px')+';">'
        +'<div style="height:2px;flex:none;width:14px;background:var(--pri);border-radius:1px"></div>'
        +'<span style="font-size:13px;font-weight:700;color:var(--pri)">'+grpName+'</span>'
        +'<span style="color:var(--tx3);font-size:11px">'+grpItems.length+' 人</span>'
        +'<div style="flex:1;height:1px;background:rgba(59,130,246,.2)"></div>'
        +'</div>';
    }

    for(var mj=0;mj<grpItems.length;mj++){
      var mem=grpItems[mj].member, tasks=grpItems[mj].tasks;
      if(!tasks.length) continue;
      var ft=tasks.filter(function(t){
        if(agLogFilter==='has_log') return (t.log_dates||[]).length>0;
        if(agLogFilter==='no_log') return !DONE.includes(t.status)&&!(t.log_dates||[]).includes(today());
        return true;
      });
      if(!ft.length) continue;
      var nl=ft.filter(function(t){return !DONE.includes(t.status)&&!(t.log_dates||[]).includes(today());}).length;
      var sn=esc(mem.name||'');
      html+='<div class="gm-member-section">'
        +'<div class="gm-member-label gm-hover-label" data-mid="'+mem.id+'" data-nm="'+sn+'"'
        +' onclick="showSingleGantt('+mem.id+',this.dataset.nm)"'
        +' style="cursor:pointer;border-radius:8px;padding:6px 10px;background:var(--s2);margin-bottom:6px">'
        +'<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--acc));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">'+mem.name.slice(0,1)+'</div>'
        +'<span style="font-size:14px">'+sn+'</span>'
        +'<span style="color:var(--tx3);font-size:11px">'+esc(mem.role||'')+' · '+ft.length+'个任务</span>'
        +(nl>0?'<span class="bd bd-amber" style="font-size:10px">⚠ '+nl+'未投入</span>':'<span class="bd bd-green" style="font-size:10px">✓ 均有进展</span>')
        +'<span style="margin-left:auto;font-size:11px;color:var(--pri)">点击详情 →</span></div>';
      html+=renderGanttTracks(ft,start,end,totalDays,todayOff,dayStep,agMonth,agHighlightDate);
      html+='</div>';
      if(isSingle&&agHighlightDate){
        var lr='';
        ft.forEach(function(t){
          var dl=(t.logs||[]).filter(function(l){return l.log_date===agHighlightDate;});
          if(!dl.length) return;
          lr+='<div style="padding:8px 0;border-bottom:1px solid rgba(51,65,85,.3)"><div style="font-weight:600;margin-bottom:4px">'+esc(t.title)+'</div>';
          dl.forEach(function(l){lr+='<div style="color:var(--ok);font-size:13px">✓ '+esc(l.content||'')+'<span style="color:var(--tx3);font-size:11px;margin-left:8px">进度 '+(l.progress_snapshot||0)+'%</span></div>';});
          lr+='</div>';
        });
        if(lr) slHtml='<div class="card" style="margin-bottom:12px;border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.05)"><div class="card-hd"><div class="ctitle" style="color:#fbbf24">&#x1F4C5; '+agHighlightDate+' 进展明细</div></div>'+lr+'</div>';
      }
    }
  }
  document.getElementById('ag-content').innerHTML=slHtml
    +'<div class="card">'+GANTT_LEGEND+'<div class="gm-wrap">'
    +'<div class="gantt-hdr"><div class="gantt-label" style="width:280px">任务</div><div class="gantt-days">'+dayHdrs+'</div></div>'
    +(html||'<div class="empty">无符合条件的任务</div>')
    +'</div></div>';
}

      <div class="mhd">

async function refreshSingleGantt(memberId, memberName){
  const yr=parseInt(document.getElementById('sg-year')?.value||agYear);
  const moVal=document.getElementById('sg-month')?.value;
  const mo=moVal?parseInt(moVal):null;
  const typeFilter=document.getElementById('sg-type')?.value||'';

  const params=`year=${yr}${mo?'&month='+mo:''}&member_ids=${memberId}&group_name=${encodeURIComponent(ME.group_name)}`;
  const data=await GET('/tasks/gantt_multi?'+params);
  if(!data) return;
  const {members,startDate,endDate}=data;
  const mData=members[0];

  let tasks=(mData?.tasks||[]).filter(t=>t.plan_start_date&&t.plan_end_date);
  if(typeFilter) tasks=tasks.filter(t=>t.task_type===typeFilter);

  const start=new Date(startDate), end=new Date(endDate);
  const totalDays=Math.ceil((end-start)/86400000)+1;
  const todayOff=Math.ceil((new Date(today())-start)/86400000);
  const dayStep=mo?1:Math.ceil(totalDays/30);
  const dayHdrs=buildDayHeaders(start,totalDays,dayStep,mo);

  if(!tasks.length){
    document.getElementById('sg-body').innerHTML='<div class="empty">该时段暂无设置了日期的任务</div>';
    return;
  }
  const done=tasks.filter(t=>['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status)).length;
  const noLog=tasks.filter(t=>!['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status)&&!(t.log_dates||[]).includes(today())).length;

  document.getElementById('sg-body').innerHTML=`
  <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <span class="bd bd-blue">共 ${tasks.length} 个任务</span>
    <span class="bd bd-green">已完成 ${done}</span>
    <span class="bd bd-teal">进行中 ${tasks.length-done}</span>
    <span class="bd ${noLog>0?'bd-amber':'bd-green'}">${noLog>0?`⚠ 今日 ${noLog} 个未投入`:'✓ 今日均有进展'}</span>
  </div>
  ${GANTT_LEGEND}
  <div class="gm-wrap">
    <div class="gantt-hdr"><div class="gantt-label" style="width:190px">任务</div><div class="gantt-days">${dayHdrs}</div></div>
    ${renderGanttTracks(tasks,start,end,totalDays,todayOff,dayStep,mo)}
  </div>`;
}

let _tipEl=null;
function showGanttTip(e,tid,title,logDates,logMapStr){
  hideGanttTip();
  let logMap={};
  try{logMap=JSON.parse(logMapStr.replace(/&quot;/g,'"'));}catch{}
  const todayLog=logMap[today()];
  const recentDates=logDates.slice(-3);
  let html=`<strong>${title}</strong><br><span style="color:var(--tx3)">点击添加/查看日志</span>`;
  if(todayLog&&todayLog.length){
    html+=`<br><br><span style="color:var(--ok)">📝 今日进展：</span><br>${todayLog.map(t=>esc(t.slice(0,60))).join('<br>')}`;
  }else{
    html+=`<br><span style="color:var(--warn)">⚠ 今日尚未记录进展</span>`;
  }
  if(recentDates.length){html+=`<br><span style="color:var(--tx3);font-size:11px">最近进展日：${recentDates.join(', ')}</span>`;}
  _tipEl=document.createElement('div');
  _tipEl.className='tooltip-box';
  _tipEl.innerHTML=html;
  _tipEl.style.left=(e.pageX+12)+'px';
  _tipEl.style.top=(e.pageY-10)+'px';
  document.body.appendChild(_tipEl);
}
function hideGanttTip(){if(_tipEl){_tipEl.remove();_tipEl=null;}}

// MONTHLY VIEW
// ════════════════════════════════════════════
let monYear=new Date().getFullYear(), monMonth=new Date().getMonth()+1, monSelMembers=[];

async function renderMonthly(){
  document.getElementById('tb-title').textContent='\u6708\u5ea6\u4efb\u52a1\u65e5\u5386';
  var allMem=(await GET('/members/active')||[]).filter(function(m){return !m.is_admin;});
  var yearOpts=[2024,2025,2026,2027].map(function(y){return '<option'+(y===monYear?' selected':'')+'>'+y+'</option>';}).join('');
  var monOpts=Array.from({length:12},function(_,i){return '<option value="'+(i+1)+'"'+(i+1===monMonth?' selected':'')+'>'+(i+1)+'\u6708</option>';}).join('');
  var filterHtml='';
  if(ME.is_admin){
    var memCbs=allMem.map(function(m){
      return '<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--s2)"><input type="checkbox" value="'+m.id+'" onchange="toggleMonMember('+m.id+',this.checked)" style="accent-color:var(--pri)"> '+esc(m.name)+'</label>';
    }).join('');
    filterHtml='<div class="card" style="margin-bottom:10px"><div style="font-size:12px;color:var(--tx2);margin-bottom:6px">\u7b5b\u9009\u6210\u5458\uff1a</div><div style="display:flex;gap:6px;flex-wrap:wrap" id="mon-filter">'+memCbs+'</div></div>';
  }
  document.getElementById('ct').innerHTML=
    '<div class="phd"><div class="ptitle">\u6708\u5ea6\u4efb\u52a1\u65e5\u5386</div>'
    +'<div style="display:flex;gap:7px;align-items:center">'
    +'<select class="fi" style="width:88px" onchange="monYear=parseInt(this.value);loadMonthly()">'+yearOpts+'</select>'
    +'<select class="fi" style="width:78px" onchange="monMonth=parseInt(this.value);loadMonthly()">'+monOpts+'</select>'
    +'</div></div>'+filterHtml+'<div id="mon-content">\u52a0\u8f7d\u4e2d...</div>';
  loadMonthly();
}

function toggleMonMember(mid,checked){
  if(checked){if(!monSelMembers.includes(mid))monSelMembers.push(mid);}
  else monSelMembers=monSelMembers.filter(x=>x!==mid);
  loadMonthly();
}

async function loadMonthly(){
  const mids=monSelMembers.length?monSelMembers.join(','):'';
  var gn=currentGroup||ME.group_name;
  if(!gn){var allM2=await GET('/members/active')||[];var fi=allM2.find(function(m){return m.group_name;});if(fi)gn=fi.group_name;}
  var params='year='+monYear+'&month='+monMonth+'&group_name='+encodeURIComponent(gn)+(mids?'&member_ids='+mids:'');
  const data=await GET('/tasks/monthly_view?'+params);
  if(!data)return;
  const {tasks,dates}=data;
  if(!tasks.length){
    document.getElementById('mon-content').innerHTML='<div class="card"><div class="empty">本月暂无任务</div></div>';
    return;
  }
  // Only show work days + weekend indicator
  const dateHeaders=dates.map(d=>{
    const dt=new Date(d); const wd=dt.getDay();
    const isToday=d===today();
    const isWeekend=wd===0||wd===6;
    return{date:d,day:dt.getDate(),isToday,isWeekend,dow:['日','一','二','三','四','五','六'][wd]};
  });

  let table=`<div class="twrap"><table class="mon-table"><thead><tr>
    <th style="text-align:left;padding:6px 8px;min-width:140px;position:sticky;left:0;background:var(--s2);z-index:3">任务</th>
    <th style="padding:6px 4px;min-width:50px">类型/负责人</th>
    <th style="padding:6px 4px;min-width:60px">状态/进度</th>
    ${dateHeaders.map(h=>`<th style="background:${h.isToday?'rgba(59,130,246,.25)':h.isWeekend?'rgba(255,255,255,.03)':'var(--s2)'};color:${h.isToday?'var(--pri)':h.isWeekend?'var(--tx3)':'var(--tx2)'};min-width:26px">${h.day}<br><span style="font-size:9px">${h.dow}</span></th>`).join('')}
  </tr></thead><tbody>`;

  for(const t of tasks){
    const done=['DELIVERED','COMPLETED','RESOLVED','CLOSED'].includes(t.status);
    table+=`<tr>
      <td class="task-name" title="${esc(t.title)}">${tbadge(t.task_type)} ${esc(t.title)}</td>
      <td style="padding:5px 4px;font-size:11px;color:var(--tx2)">${esc(t.assignee_name||'')}</td>
      <td style="padding:5px 4px">${sbadge(t.status)}<br><small style="color:var(--tx3)">${t.progress||0}%</small></td>`;
    const logsByDate=t.logs_by_date||{};
    for(const {date,isWeekend} of dateHeaders){
      const taskStart=t.plan_start_date||'', taskEnd=t.plan_end_date||'';
      const inRange=(!taskStart||date>=taskStart)&&(!taskEnd||date<=taskEnd);
      const logs=logsByDate[date]||[];
      const hasLog=logs.length>0;
      let cellClass='', cellTitle='', cellContent='';
      if(!inRange){
        cellClass=''; cellContent='';
      }else if(done){
        cellClass='mon-cell-done'; cellContent='✓';
      }else if(hasLog){
        cellClass='mon-cell-log';
        cellTitle=logs.map(l=>l.content).join(' | ').slice(0,100);
        cellContent=`<span title="${esc(cellTitle)}" style="font-size:10px">📝${logs.length>1?logs.length:''}</span>`;
      }else if(inRange&&!isWeekend){
        cellClass='mon-cell-nolog'; cellContent='·';
      }
      table+=`<td class="${cellClass}" title="${esc(cellTitle)}" onclick="${hasLog?`showMonLog('${date}',${t.id})`:''}">
        ${cellContent}
      </td>`;
    }
    table+='</tr>';
  }
  table+='</tbody></table></div>';

  // Summary: active days per task
  const legend=`<div style="display:flex;gap:12px;font-size:12px;margin-bottom:10px;flex-wrap:wrap">
    <span><span style="display:inline-block;width:14px;height:14px;background:rgba(16,185,129,.15);border-radius:3px;vertical-align:middle"></span> 有进展记录</span>
    <span><span style="display:inline-block;width:14px;height:14px;background:rgba(245,158,11,.08);border-radius:3px;vertical-align:middle"></span> 计划中未投入</span>
    <span><span style="display:inline-block;width:14px;height:14px;background:rgba(16,185,129,.06);border-radius:3px;vertical-align:middle"></span> 已完成</span>
    <span style="color:var(--tx3)">点击📝格子可查看当日进展</span>
  </div>`;

  document.getElementById('mon-content').innerHTML=`<div class="card">${legend}${table}</div>`;
}

async function showMonLog(date,taskId){
  const logs=await GET('/tasks/'+taskId+'/logs')||[];
  const dayLogs=logs.filter(l=>l.log_date===date);
  if(!dayLogs.length){toast('当日暂无进展记录');return;}
  const task=await GET('/tasks/'+taskId);
  openModal(`${date} · ${esc(task?.title||'')} 进展`,
    dayLogs.map(l=>`<div style="padding:10px;background:var(--s2);border-radius:8px;margin-bottom:8px">
      <div style="font-size:12px;color:var(--tx2);margin-bottom:4px">by ${esc(l.member_name||'')} · 进度 ${l.progress_snapshot||0}%</div>
      <div style="font-size:13px">${esc(l.content)}</div>
    </div>`).join(''),
    ()=>closeModal());
}
