<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>团队管理系统</title>
<link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="lp">
  <div class="lbox">
    <div class="llogo">
      <div class="ico">📊</div>
      <h1>团队管理系统</h1>
      <p>请登录您的账号</p>
    </div>
    <div class="fgroup"><label class="flabel">用户名</label>
      <input id="lu" class="linput" placeholder="用户名" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="fgroup"><label class="flabel">密码</label>
      <input id="lp2" class="linput" type="password" placeholder="密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" onclick="doLogin()">登 录</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <aside class="sb">
    <div class="sb-top">
      <div class="sb-logo"><div class="ico">📊</div><span>团队管理</span></div>
      <div class="ucard">
        <div class="uav" id="sb-av">?</div>
        <div><div class="uname" id="sb-name">-</div><div class="urole" id="sb-role">-</div></div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-bot">
      <button class="ni" onclick="showPage('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>个人设置
      </button>
      <button class="ni" onclick="doLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出
      </button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <div class="tb-title" id="tb-title">总览</div>
      <div id="tb-right"></div>
    </header>
    <div class="content" id="ct"></div>
  </div>
</div>
<div id="mw"></div>

<!-- Feature scripts — plain classical <script> tags, no build step.
     Load order matters: boot.js (which calls initAppearance()/checkAuth()) must be last,
     since by then every function/global above has been defined on window. -->
<script src="/static/js/core.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/checkin.js"></script>
<script src="/static/js/tasks.js"></script>
<script src="/static/js/team.js"></script>
<script src="/static/js/reports.js"></script>
<script src="/static/js/profile.js"></script>
<script src="/static/js/member-view.js"></script>
<script src="/static/js/admin-gantt.js"></script>
<script src="/static/js/dayplan.js"></script>
<script src="/static/js/overtime.js"></script>
<script src="/static/js/progress.js"></script>
<script src="/static/js/help.js"></script>
<script src="/static/js/boot.js"></script>
</body>
</html>
